# Quillan model pricing table
#
# Keys are LiteLLM model strings (what litellm_model_string() returns).
# Values are [input_usd_per_1M_tokens, output_usd_per_1M_tokens].
# Prices are approximate; update as providers change rates.
#
# To add new models or override prices without editing source, create a file
# named model_pricing.yaml in your working directory. Entries there are merged
# on top of this bundled table — you only need to list the models you want to
# add or change.
#
# Example override file:
#   my-local-model: [0.00, 0.00]
#   openai/gpt-5: [5.00, 20.00]

